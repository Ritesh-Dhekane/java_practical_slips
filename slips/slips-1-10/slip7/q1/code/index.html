<!DOCTYPE html>
<!--
    Slip 7 - Question 1 (HTML Form)
    This form sends employee name to WelcomeServlet.
-->
<html>
<head>
    <title>Employee Welcome Form</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 50px; background: #f0f0f0; }
        .box { background: white; padding: 30px; border-radius: 8px; width: 350px; }
        input[type=text] { width: 100%; padding: 8px; margin: 10px 0; }
        input[type=submit] { background: #4CAF50; color: white; padding: 10px 20px; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Employee Login</h2>
        <form action="WelcomeServlet" method="post">
            <label>Employee Name:</label>
            <input type="text" name="empName" placeholder="Enter your name" required />
            <br/>
            <input type="submit" value="Submit" />
        </form>
    </div>
</body>
</html>
