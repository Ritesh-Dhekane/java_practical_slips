<!DOCTYPE html>
<html>
<head>
    <title>Sum of Two Numbers</title>
    <style>
        body { font-family: Arial; margin: 50px; background: #e8f5e9; }
        .box { background: white; padding: 30px; border-radius: 8px; width: 320px; }
        input[type=number] { width: 100%; padding: 8px; margin: 6px 0; box-sizing: border-box; }
        input[type=submit] { background: #388e3c; color: white; padding: 10px 20px;
                             border: none; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Sum Calculator</h2>
        <form action="SumServlet" method="get">
            <label>Number 1:</label>
            <input type="number" name="num1" placeholder="Enter first number" required />
            <label>Number 2:</label>
            <input type="number" name="num2" placeholder="Enter second number" required />
            <br/><br/>
            <input type="submit" value="Calculate Sum" />
        </form>
    </div>
</body>
</html>
